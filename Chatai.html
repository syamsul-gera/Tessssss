<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
</head>
<body>
  <div class="chat-container">
    <div id="chatbox"></div>
    <div class="input-group">
        <input type="text" id="user-input" placeholder="Ketik pesan di sini..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
const chatbox = document.getElementById('chatbox');
const userInput = document.getElementById('user-input');

// Fungsi mendeteksi tombol Enter
function handleKeyPress(event) {
    if (event.key === 'Enter') {
        sendMessage();
    }
}

function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    // 1. Tampilkan pesan user
    chatbox.innerHTML += `<div class="user-msg"><b>Anda:</b> ${text}</div>`;
    userInput.value = '';

    // 2. Logika jawaban bot (Ubah teks jadi huruf kecil agar tidak sensitif)
    const lowerText = text.toLowerCase();
    let botResponse = '';

    if (lowerText === 'hai' || lowerText === 'halo') {
        botResponse = 'Hai juga! Ada yang bisa saya bantu?';
    } 
    else if (lowerText === 'siapa namamu?') {
        botResponse = 'Saya adalah <b>Bot HTML Sederhana</b>.';
    } 
    else if (lowerText === 'terima kasih') {
        botResponse = 'Sama-sama! Senang bisa membantu. 👍';
    } 
    else {
        // Jawaban jika kata kunci tidak dikenali
        botResponse = 'Maaf, saya tidak mengerti. Coba ketik <i>"hai"</i> atau <i>"siapa namamu?"</i>.';
    }

    // 3. Tampilkan jawaban bot dengan jeda sedikit agar terasa alami
    setTimeout(() => {
        chatbox.innerHTML += `<div class="bot-msg"><b>Bot:</b> ${botResponse}</div>`;
        chatbox.scrollTop = chatbox.scrollHeight; // Auto-scroll ke bawah
    }, 400);
}
</script>
</body>
</html>
